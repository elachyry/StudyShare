name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: studyshare
          POSTGRES_PASSWORD: studyshare
          POSTGRES_DB: studyshare
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U studyshare"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    env:
      # Host-run tools connect to the service containers on localhost.
      TEST_DATABASE_URL_BASE: postgresql://studyshare:studyshare@localhost:5432/studyshare
      DATABASE_URL: postgresql://studyshare:studyshare@localhost:5432/studyshare
      JWT_ACCESS_SECRET: ci-access-secret-000000000000000000000000000
      JWT_REFRESH_SECRET: ci-refresh-secret-00000000000000000000000000
      COOKIE_SECRET: ci-cookie-secret-0000000000000000000000000000
      CSRF_SECRET: ci-csrf-secret-000000000000000000000000000000
      S3_ENDPOINT: http://localhost:9000

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @studyshare/api db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Audit (non-blocking)
        run: pnpm audit --prod || true
