<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StudyShare — share and discover academic resources." />
    <title>StudyShare</title>
    <!--
      Pre-paint theme script: applies the persisted theme (or the OS preference)
      before first paint to avoid a flash of the wrong theme.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('ss-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          var root = document.documentElement;
          root.classList.toggle('dark', theme === 'dark');
          root.setAttribute('data-theme', theme);
          var lang = localStorage.getItem('ss-lang');
          if (lang) root.setAttribute('lang', lang);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
